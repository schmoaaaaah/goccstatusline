name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  build-binaries:
    name: Build Release Binaries
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64
          - goos: windows
            goarch: amd64
          - goos: windows
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Go
        uses: jdx/mise-action@v4
        with:
          install: true
          cache: true

      - name: Build binary
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          ext=""
          if [ "${{ matrix.goos }}" = "windows" ]; then ext=".exe"; fi
          go build -v -trimpath -ldflags="-s -w" -o goccstatusline-${{ matrix.goos }}-${{ matrix.goarch }}${ext} .

      - name: Upload binary
        uses: actions/upload-artifact@v7
        with:
          path: goccstatusline-${{ matrix.goos }}-${{ matrix.goarch }}${{ matrix.goos == 'windows' && '.exe' || '' }}
          archive: false

  create-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts
          pattern: goccstatusline-*
          merge-multiple: true

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Generate checksums and release body
        env:
          VERSION: ${{ steps.version.outputs.VERSION }}
          REPO: ${{ github.repository }}
        run: |
          cd artifacts
          sha256sum goccstatusline-* > ../checksums.txt
          cd ..

          BASE_URL="https://github.com/${REPO}/releases/download/v${VERSION}"
          CHECKSUMS_URL="${BASE_URL}/checksums.txt"

          cat > release-body.md <<EOF
          ## Release v${VERSION}

          ### Installation
          Download the binary for your platform, make it executable, and place it in your PATH.

          \`\`\`bash
          # Example for Linux AMD64
          chmod +x goccstatusline-linux-amd64
          mv goccstatusline-linux-amd64 ~/.local/bin/goccstatusline
          \`\`\`

          ### Available binaries
          | Platform | Architecture | Binary | SHA256 |
          |----------|-------------|--------|--------|
          EOF

          for file in artifacts/goccstatusline-*; do
            name=$(basename "$file")
            checksum=$(grep "$name" checksums.txt | awk '{print $1}')
            short_checksum="${checksum:0:16}..."
            url="${BASE_URL}/${name}"

            case "$name" in
              *linux-amd64*)   platform="Linux";  arch="AMD64" ;;
              *linux-arm64*)   platform="Linux";  arch="ARM64" ;;
              *darwin-amd64*)  platform="macOS";  arch="Intel" ;;
              *darwin-arm64*)  platform="macOS";  arch="Apple Silicon" ;;
              *windows-amd64*) platform="Windows"; arch="AMD64" ;;
              *windows-arm64*) platform="Windows"; arch="ARM64" ;;
            esac

            echo "| ${platform} | ${arch} | [${name}](${url}) | \`${short_checksum}\` |" >> release-body.md
          done

          cat >> release-body.md <<EOF

          ### Checksums
          Full checksums available in [checksums.txt](${CHECKSUMS_URL}).

          ### Verification
          All binaries include [artifact attestations](https://docs.github.com/en/actions/concepts/security/artifact-attestations). Verify with:
          \`\`\`bash
          gh attestation verify goccstatusline-linux-amd64 -o ${REPO%%/*}
          \`\`\`

          ---
          **Full Changelog**: https://github.com/${REPO}/commits/v${VERSION}
          EOF

      - name: Attest build provenance
        uses: actions/attest@v4
        with:
          subject-checksums: checksums.txt

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: Release v${{ steps.version.outputs.VERSION }}
          body_path: release-body.md
          files: |
            artifacts/goccstatusline-*
            checksums.txt
          draft: false
          prerelease: false
